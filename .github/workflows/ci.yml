name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Verify game and LabyMake engine
    # windows-latest is required: SafePathPolicy.IsSafeFileStem delegates to
    # Path.GetInvalidFileNameChars(), and the backend suite
    # (ExportIoDeepTests.TestExportIoSafePathPolicyModel) asserts Windows-only
    # rejections such as "a|b", "a\tb", and "dir\leaf" that Linux treats as
    # valid file names.
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout pinned EFYV runtime kernel
        uses: actions/checkout@v4
        with:
          repository: yves-halimi-hub/EFYV-runtime-kernel
          ref: 16260b07de77e15d09f373d5833a5e7243fe14eb
          path: .deps/EFYV-runtime-kernel
          ssh-key: ${{ secrets.EFYV_RUNTIME_KERNEL_DEPLOY_KEY }}
          persist-credentials: false

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          # The backend and LabyMake engine target net8.0; the game verification
          # project targets net10.0.
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build pinned shared runtime kernel (Release)
        shell: pwsh
        run: |
          cmake `
            -S .deps/EFYV-runtime-kernel `
            -B .deps/EFYV-runtime-kernel/build/msvc `
            -A x64 `
            -DBUILD_SHARED_LIBS=ON `
            -DEFYV_RUNTIME_BUILD_TESTS=OFF `
            -DEFYV_RUNTIME_BUILD_BENCHMARKS=OFF
          cmake --build .deps/EFYV-runtime-kernel/build/msvc --config Release --parallel

          $kernelDll = Resolve-Path ".deps/EFYV-runtime-kernel/build/msvc/Release/efyv_runtime_kernel.dll"
          Split-Path -Parent $kernelDll | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "EFYV_REQUIRE_NATIVE_KERNEL=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Backend verification (net8.0)
        run: dotnet run --project EFYV-labybackend/Tests/EFYVBackend.Verification.csproj -c Release

      - name: LabyMake gRPC engine build (net8.0)
        run: dotnet build EFYV-labymake/services/labymake-engine/LabyMakeEngine.csproj -c Release

      - name: Game and editor verification (net10.0)
        run: dotnet run --project EFYV-labyrinth/Tests/EFYVGame.Verification.csproj -c Release

      - name: Python contract tests
        run: python -m unittest discover -s EFYV-labyrinth/Tests -p "test_*.py" -v
